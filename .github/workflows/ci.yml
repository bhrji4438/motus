name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Release Manifest and Artifact Validation
        run: npm run release:check

      - name: Check Changeset Status
        run: |
          # Fetch main branch to check diff
          git fetch origin main:main
          
          # Check if any releaseable package files have changed
          # We check files in packages/ directory, ignoring common config/docs if any
          CHANGED_PACKAGES=$(git diff --name-only main...HEAD -- 'packages/')
          
          if [ -n "$CHANGED_PACKAGES" ]; then
            echo "Changes detected in packages:"
            echo "$CHANGED_PACKAGES"
            echo "Verifying changeset presence..."
            npx changeset status
          else
            echo "No package changes detected. Skipping changeset status check."
          fi
        shell: bash
